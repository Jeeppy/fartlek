# frozen_string_literal: true

require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "tmp/**/*"

# ─── Style ────────────────────────────────────────────
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/SymbolArray:
  EnforcedStyle: brackets

Style/WordArray:
  EnforcedStyle: brackets

# ─── Layout ───────────────────────────────────────────
Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - "^\\s*#"

# ─── Metrics ──────────────────────────────────────────
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "config/routes.rb"
    - "config/environments/**/*"
    - "lib/tasks/**/*"

Metrics/MethodLength:
  Max: 15

Metrics/AbcSize:
  Max: 20

# ─── Rails ────────────────────────────────────────────
Rails/SkipsModelValidations:
  Enabled: false

# ─── RSpec ────────────────────────────────────────────
RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

RSpec/ExampleLength:
  Max: 15

RSpec/LetSetup:
  Enabled: false
